<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — Canopy Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #09091a; --ink: #f4f2ff; --ink-dim: #a09ec0;
      --cyan: #22d3ee; --purple: #a855f7; --pink: #ec4899;
      --gradient: linear-gradient(90deg, #22d3ee, #a855f7, #ec4899);
      --gradient-diag: linear-gradient(135deg, #22d3ee 0%, #a855f7 50%, #ec4899 100%);
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: "Space Grotesk", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body::before {
      content: ''; position: fixed; top: -20%; right: -15%; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.18) 0%, transparent 70%); pointer-events: none; z-index: 0;
    }
    main { position: relative; z-index: 5; max-width: 560px; margin: 0 auto; padding: 80px 24px; text-align: center; }
    .check-icon {
      width: 72px; height: 72px; border-radius: 50%; background: var(--gradient-diag);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; font-size: 2rem;
    }
    h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 12px; }
    p { color: var(--ink-dim); font-size: 0.98rem; line-height: 1.7; margin-bottom: 32px; }
    .btn-download {
      display: inline-block; padding: 16px 40px; border-radius: 12px; background: var(--gradient);
      color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700; text-decoration: none;
      transition: opacity 0.2s, transform 0.15s; margin-bottom: 32px;
    }
    .btn-download:hover { opacity: 0.88; transform: translateY(-2px); }
    .divider { width: 60px; height: 2px; background: var(--gradient); border-radius: 2px; margin: 0 auto 28px; }
    .next-box {
      background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.2);
      border-radius: 14px; padding: 22px 26px; text-align: left;
    }
    .next-box .label { font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--purple); margin-bottom: 8px; }
    .next-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .next-box p { font-size: 0.85rem; color: var(--ink-dim); margin-bottom: 0; }
    footer { text-align: center; padding: 20px 24px 36px; font-size: 0.78rem; color: var(--ink-dim); }
  </style>
</head>
<body>
  <main>
    <div class="check-icon">✓</div>
    <h1>Payment confirmed.</h1>
    <p id="success-msg">Your download is ready.</p>

    <a id="download-btn" href="#" class="btn-download">Download Now →</a>

    <div class="divider"></div>

    <div class="next-box">
      <div class="label">Keep going</div>
      <h3>Free Workshop — Every Wednesday 8PM EST</h3>
      <p>Women using AI to build real businesses. Come through and see what's possible. Link in bio or ask us how to join.</p>
    </div>
  </main>
  <footer>&copy; 2025 Canopy Academy &nbsp;·&nbsp; Prompt → Profit</footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product');
    const isKit = product === 'kit';

    const downloadUrl = isKit ? '/download-kit' : '/download';
    const filename = isKit ? 'Canopy-Academy-Prompt-Starter-Kit.pdf' : 'Canopy-Academy-DM-Playbook.pdf';
    const btnText = isKit ? 'Download the Prompt Starter Kit →' : 'Download the DM Playbook →';
    const msg = isKit
      ? 'Your Prompt Starter Kit is ready. 30 copy-paste prompts across 5 categories. Start anywhere.'
      : 'Your playbook is ready. 10 prompts. Every stage of the DM conversation. Start with Prompt 1 and run them in sequence.';

    document.getElementById('success-msg').textContent = msg;
    const btn = document.getElementById('download-btn');
    btn.textContent = btnText;
    btn.href = downloadUrl;

    setTimeout(() => {
      const link = document.createElement('a');
      link.href = downloadUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, 1000);
  </script>
</body>
</html>
